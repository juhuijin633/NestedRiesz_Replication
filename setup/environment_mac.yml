name: riesz
channels:
  - conda-forge
channel_priority: strict

dependencies:
  # Base interpreter and build tools
  - python=3.10
  - pip
  - setuptools
  - wheel

  # Needed if the project uses rpy2 / R-linked code. Safe to keep; remove if unused.
  - r-base>=4.3,<4.5

  # Install the Python stack via pip to avoid Linux build pins from the original export.
  - pip:
      # Core scientific stack
      - numpy==1.26.4
      - scipy==1.15.3
      - pandas==2.2.3
      - scikit-learn==1.5.2
      - statsmodels==0.14.4
      - patsy==1.0.1
      - numba==0.61.2
      - llvmlite==0.44.0
      - sparse==0.16.0
      - networkx==3.4.2
      - mpmath==1.3.0
      - sympy==1.14.0

      # ML / causal inference packages
      - torch==2.7.0
      - econml==0.15.1
      - lightgbm==4.6.0
      - shap==0.43.0
      - slicer==0.0.7
      - cloudpickle==3.1.1
      - joblib==1.5.1
      - threadpoolctl==3.6.0

      # Plotting
      - matplotlib==3.10.3
      - matplotlib-inline==0.1.7
      - seaborn==0.13.2
      - contourpy==1.3.2
      - cycler==0.12.1
      - fonttools==4.58.4
      - kiwisolver==1.4.7
      - pillow==11.2.1
      - pyparsing==3.2.3

      # Jupyter / notebook support
      - ipykernel==6.29.5
      - ipython==8.12.3
      - jupyter-client==8.6.3
      - jupyter-core==5.8.1
      - nbclient==0.10.2
      - nbconvert==7.16.6
      - nbformat==5.10.4
      - jupyterlab-pygments==0.3.0
      - ipython-pygments-lexers==1.1.1
      - pyzmq==26.4.0
      - tornado==6.5.1
      - traitlets==5.14.3
      - comm==0.2.2
      - debugpy==1.8.14
      - nest-asyncio==1.6.0
      - prompt-toolkit==3.0.51
      - pygments==2.19.1
      - stack-data==0.6.3
      - asttokens==3.0.0
      - executing==2.2.0
      - pure-eval==0.2.3
      - jedi==0.19.2
      - parso==0.8.4
      - pexpect==4.9.0
      - ptyprocess==0.7.0
