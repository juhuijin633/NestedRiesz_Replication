      - jsonschema==4.24.0
      - jsonschema-specifications==2025.4.1
      - mistune==3.1.3
      - pandocfilters==1.5.1
      - referencing==0.36.2
      - requests==2.32.3
      - rpds-py==0.25.1
      - soupsieve==2.7
      - tinycss2==1.4.0
      - urllib3==2.4.0
